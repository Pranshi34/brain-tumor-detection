<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brain Tumor Detection</title>

<style>
/* ---------- GLOBAL ---------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    color: #f5f7ff;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    background: #06070d;
    position: relative;
}

/* ---------- GLOBAL ---------- */
body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    color: #f5f7ff;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    background: #0a0b12;
    position: relative;
}

/* Soft elegant ambient glow */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(167, 139, 250, 0.14), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(125, 211, 252, 0.10), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(196, 181, 253, 0.08), transparent 40%),
        linear-gradient(135deg, #0a0b12 0%, #10121c 45%, #151827 100%);
    filter: blur(35px);
    animation: floatGlow 14s ease-in-out infinite alternate;
    z-index: -2;
}

/* Soft premium grid */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(68, 233, 181, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(94, 196, 230, 0.035) 1px, transparent 1px);
    background-size: 55px 55px;
    z-index: -1;
    filter: drop-shadow(0 0 4px rgba(196, 181, 253, 0.08));
}
@keyframes floatGlow {
    0% { transform: scale(1) translateY(0px); }
    100% { transform: scale(1.15) translateY(-20px); }
}

/* ---------- ANIMATIONS ---------- */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ---------- CONTAINER ---------- */
.container {
    margin-top: 60px;
    padding: 20px;
    animation: fadeInUp 0.9s ease;
    position: relative;
    z-index: 1;
}

/* ---------- CARD ---------- */
.card {
    width: 400px;
    max-width: 92%;
    margin: auto;
    padding: 32px;
    border-radius: 28px;
    background: rgba(17, 25, 40, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: all 0.35s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow:
        0 12px 36px rgba(124, 58, 237, 0.18),
        0 8px 30px rgba(0, 0, 0, 0.5);
}

/* ---------- TITLE ---------- */
h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ffffff, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #b8bfd8;
    font-size: 0.98rem;
    margin-bottom: 24px;
    line-height: 1.5;
}

/* ---------- BUTTON ---------- */
button {
    margin-top: 18px;
    padding: 13px 28px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 18px rgba(124, 58, 237, 0.35);
}

button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 22px rgba(124, 58, 237, 0.45);
}

button:active {
    transform: scale(0.98);
}

/* ---------- IMAGE ---------- */
img {
    width: 100%;
    max-width: 320px;
    border-radius: 16px;
    margin-top: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    transition: all 0.35s ease;
}

img:hover {
    transform: scale(1.03);
}

/* ---------- RESULT ---------- */
.result {
    margin-top: 22px;
    padding-top: 10px;
    animation: fadeInUp 0.8s ease;
}

.prediction {
    font-size: 1.35rem;
    font-weight: 700;
    color: #ffffff;
}

.confidence {
    color: #67e8f9;
    margin-top: 6px;
    font-size: 0.96rem;
    font-weight: 500;
}

/* ---------- PROGRESS BAR ---------- */
.progress-bar {
    width: 100%;
    height: 12px;
    margin-top: 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.35);
}

.progress {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
    transition: width 1s ease-in-out;
}

/* ---------- LOADER ---------- */
.loader {
    display: none;
    margin-top: 18px;
}

.loader div {
    width: 10px;
    height: 10px;
    display: inline-block;
    margin: 0 4px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #3b82f6);
    animation: bounce 0.7s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.15s; }
.loader div:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
    to {
        transform: translateY(-10px);
        opacity: 0.7;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Brain Tumor Detection</h1>
    <p class="subtitle">Upload MRI scan to detect tumor type</p>

    <div class="card">

        <!-- FORM -->
        <form method="POST" action="/predict" enctype="multipart/form-data" onsubmit="showLoader()">
            <input type="file" name="file" onchange="previewImage(event)" required>
            <br>
            <img id="preview" style="display:none;">
            <br>
            <button type="submit">Analyze</button>
        </form>

        <!-- LOADER -->
        <div class="loader" id="loader">
            <div></div><div></div><div></div>
            <p>Analyzing...</p>
        </div>

        <!-- RESULT SECTION -->
        {% if prediction %}
        <div class="result">
            <div class="prediction">Prediction: {{ prediction }}</div>
            <div class="confidence">Confidence: {{ confidence }}</div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        {% endif %}

    </div>
</div>

<script>
// IMAGE PREVIEW
function previewImage(event) {
    const img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}

// LOADER
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

// PROGRESS BAR ANIMATION
window.onload = function() {
    let confText = "{{ confidence or 0 }}";
    if(confText){
        let value = parseFloat(confText);
        document.getElementById("progress").style.width = value + "%";
    }
}
</script>

</body>
</html>
